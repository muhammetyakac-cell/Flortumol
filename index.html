<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Temel SEO Meta Etiketleri -->
    <title>Flört Chat - Yeni İnsanlarla Tanışın & Canlı Sohbet Edin</title>
    <meta name="description" content="Flört Chat ile yeni insanlarla tanışın, canlı sohbet edin ve arkadaşlıklar kurun. Güvenli, hızlı ve heyecanlı bir flört deneyimi için şimdi ücretsiz katılın!" />
    <meta name="keywords" content="flört, canlı sohbet, arkadaşlık sitesi, sohbet uygulaması, yeni insanlarla tanış, sohbet odaları" />
    <meta name="author" content="Flort Chat Team" />
    <meta name="robots" content="index, follow" />
    <meta name="theme-color" content="#ec4899" />

    <!-- Canonical URL -->
    <link rel="canonical" href="https://flortbeta.vercel.app" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://flortbeta.vercel.app" />
    <meta property="og:title" content="Flört Chat - Yeni İnsanlarla Tanışın & Canlı Sohbet Edin" />
    <meta property="og:description" content="Canlı sohbet, gerçek kullanıcılar ve hızlı eşleşmeler. Aradığın arkadaş Flört Chat'te!" />
    <meta property="og:image" content="https://flortbeta.vercel.app/og-image.png" />
    <meta property="og:site_name" content="Flört Chat" />

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://flortbeta.vercel.app" />
    <meta name="twitter:title" content="Flört Chat - Yeni İnsanlarla Tanışın & Canlı Sohbet Edin" />
    <meta name="twitter:description" content="Canlı sohbet, gerçek kullanıcılar ve hızlı eşleşmeler. Aradığın arkadaş Flört Chat'te!" />
    <meta name="twitter:image" content="https://flortbeta.vercel.app/og-image.png" />

    <!-- Favicon ve Apple Touch Icon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/logo192.png" />

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- hreflang: Türkçe / Türkiye hedeflemesi -->
    <link rel="alternate" hreflang="tr" href="https://flortbeta.vercel.app" />
    <link rel="alternate" hreflang="tr-TR" href="https://flortbeta.vercel.app" />
    <link rel="alternate" hreflang="x-default" href="https://flortbeta.vercel.app" />

    <!-- JSON-LD Structured Data: WebSite -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Flört Chat",
      "url": "https://flortbeta.vercel.app",
      "description": "Flört Chat ile yeni insanlarla tanışın, canlı sohbet edin ve arkadaşlıklar kurun.",
      "inLanguage": "tr-TR",
      "potentialAction": {
        "@type": "SearchAction",
        "target": {
          "@type": "EntryPoint",
          "urlTemplate": "https://flortbeta.vercel.app/?q={search_term_string}"
        },
        "query-input": "required name=search_term_string"
      }
    }
    </script>

    <!-- JSON-LD Structured Data: Organization -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Flört Chat",
      "url": "https://flortbeta.vercel.app",
      "logo": "https://flortbeta.vercel.app/logo192.png",
      "description": "Türkiye'nin canlı flört ve sohbet platformu.",
      "sameAs": []
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
